[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.zip", "php84Extensions.gd", "php84Extensions.bcmath", "php84Extensions.exif", "composer"]

[phases.install]
